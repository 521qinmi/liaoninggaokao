services:
  # 后端服务
  - type: web
    name: college-choice-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node test-server.js
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production

  # 前端服务
  - type: static
    name: college-choice-frontend
    staticPublishPath: frontend/dist
    buildCommand: cd frontend && npm install && npm run build
    routes:
      - path: /
        destination: /index.html
